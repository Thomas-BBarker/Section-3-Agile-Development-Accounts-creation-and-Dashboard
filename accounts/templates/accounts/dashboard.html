{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Your Dashboard</title>

    <link
        rel="stylesheet"
        href="{% static 'home/css/style.css' %}"
    >
</head>

<body>

    <header>
        <h1>Digital Footprint Risk Assessment</h1>

        <nav>
            <a href="{% url 'home:home' %}">Home</a>

            <a href="{% url 'home:information-centre' %}">
                Information Centre
            </a>

            <a href="{% url 'accounts:dashboard' %}">
                Dashboard
            </a>

            <form
                class="logout-form"
                method="post"
                action="{% url 'accounts:logout' %}"
            >
                {% csrf_token %}

                <button type="submit" class="logout-button">
                    Log out
                </button>
            </form>
        </nav>
    </header>

    <main>
        <section class="dashboard-section">
            <h2>Welcome, {{ user.username }}</h2>

            <p>
                You are now logged into your private account.
            </p>

            <div class="dashboard-card">
                <h3>Your risk assessments</h3>

                <p>
                    You have not completed an assessment yet.
                </p>

                <button type="button">
                    Start assessment
                </button>
            </div>
        </section>
    </main>

</body>
</html>
