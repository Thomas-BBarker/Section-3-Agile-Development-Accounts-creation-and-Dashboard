{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Create Account</title>

    <link
        rel="stylesheet"
        href="{% static 'home/css/style.css' %}"
    >
</head>

<body>

    <header>
        <h1>Digital Footprint Risk Assessment</h1>

        <nav>
            <a href="{% url 'home:home' %}">Home</a>

            <a href="{% url 'home:information-centre' %}">
                Information Centre
            </a>

            <a href="{% url 'accounts:login' %}">
                Login
            </a>
        </nav>
    </header>

    <main>
        <section class="account-form">
            <h2>Create an account</h2>

            <p>
                Register to access your private risk assessment dashboard.
            </p>

            <form method="post">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit">
                    Create account
                </button>
            </form>

            <p class="account-link">
                Already have an account?

                <a href="{% url 'accounts:login' %}">
                    Log in
                </a>
            </p>
        </section>
    </main>

</body>
</html>
